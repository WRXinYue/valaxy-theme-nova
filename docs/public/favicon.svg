<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Nova">
  <defs>
    <mask id="nova-hole" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#ffffff"/>
      <circle cx="50" cy="50" r="22" fill="#000000"/>
    </mask>
    <filter id="nova-glow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b0"/>
      <feFlood flood-color="#ede9fe" flood-opacity="0.45" result="f0"/>
      <feComposite in="f0" in2="b0" operator="in" result="g0"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="b1"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.55" result="f1"/>
      <feComposite in="f1" in2="b1" operator="in" result="g1"/>
      <feMerge>
        <feMergeNode in="g0"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="20" fill="#000000"/>

  <g filter="url(#nova-glow)">
    <circle cx="50" cy="50" r="30" fill="#ffffff" mask="url(#nova-hole)"/>
    <rect
      x="48.25"
      y="-2"
      width="3.5"
      height="104"
      rx="1"
      fill="#ffffff"
      transform="rotate(45 50 50)"
    />
  </g>
</svg>
